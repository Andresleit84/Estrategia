name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, test, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: okr_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: okr_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://okr_user:test_password@localhost:5432/okr_test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: okr_test
      DB_USER: okr_user
      DB_PASSWORD: test_password
      JWT_SECRET: ci_jwt_secret_32_chars_minimum_x
      JWT_REFRESH_SECRET: ci_refresh_secret_32_chars_min_x
      REDIS_URL: redis://localhost:6379
      ANTHROPIC_API_KEY: sk-ant-api-test-key-not-real-ci-placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test -- --passWithNoTests --forceExit

      - name: Build
        run: npm run build

  frontend:
    name: Frontend — typecheck, lint, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3010/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

  deploy:
    name: Deploy a producción
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /root/estrategia
            git pull origin main
            bash scripts/deploy.sh
