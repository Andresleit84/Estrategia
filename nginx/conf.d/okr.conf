# ================================================================
# Nginx — Configuración OKR System
# Sustituir TU_DOMINIO.COM con el dominio real antes de activar SSL
# ================================================================

# Upstream backends
upstream okr_backend {
    server 127.0.0.1:3020;
    keepalive 32;
}

upstream okr_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → redirigir todo a HTTPS ─────────────────────────────
server {
    listen 80;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    # Certbot challenge (antes de tener SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    # SSL (generado por Certbot — ver INSTALL.md)
    ssl_certificate /etc/letsencrypt/live/TU_DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.COM/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/TU_DOMINIO.COM/chain.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CSP — ajustar según necesidades de la app
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.anthropic.com wss://$host;" always;

    # ── API Backend (/api y /mcp) ──────────────────────────────
    location ~ ^/(api|mcp|health)/ {
        proxy_pass http://okr_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Rate limiting API
        limit_req zone=api burst=20 nodelay;
    }

    # ── WebSocket (notificaciones en tiempo real) ──────────────
    location /socket.io/ {
        proxy_pass http://okr_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── AI Chat streaming (SSE) ────────────────────────────────
    location /api/v1/ai/stream {
        proxy_pass http://okr_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Frontend Next.js (todo lo demás) ──────────────────────
    location / {
        proxy_pass http://okr_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Archivos estáticos Next.js con caché agresiva
    location /_next/static/ {
        proxy_pass http://okr_frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ── Rate limiting zones ────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
